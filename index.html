<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Series</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <a class="navbar-brand" href="#">
            📺 TV Series
        </a>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h2>Series List</h2>
                
                <!-- Tabla de Series -->
                <table class="table table-striped table-hover">
                    <thead class="thead-dark">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Channel</th>
                            <th>Seasons</th>
                        </tr>
                    </thead>
                    <tbody id="series-tbody">
                        <!-- Las filas se generan dinámicamente con TypeScript -->
                    </tbody>
                </table>

                <!-- Promedio de temporadas (Fase 2) -->
                <p id="seasons-average" class="text-info font-weight-bold"></p>
            </div>
        </div>
    </div>

    <!-- Script TypeScript compilado -->
    <script type="module" src="./scripts/main.js"></script>
</body>
</html>
